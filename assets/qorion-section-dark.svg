<svg xmlns="http://www.w3.org/2000/svg" width="420" height="60" viewBox="0 0 420 60">
  <defs>
    <style>
      .company-name { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 3px; }
      .company-desc { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; }
    </style>
  </defs>

  <!-- Logo + Name as a centered group -->
  <g transform="translate(210, 0)">
    <!-- Qorion Logo, vertically centered with text -->
    <g transform="translate(-55, 0) scale(0.08)">
      <g fill="#ffffff" transform="rotate(30,154.64588,144.51057)">
        <path d="M 114.50205,77.604049 72.594019,101.78345 v 61.72492 l 41.908031,24.19542 21.49378,12.40958 v -48.39136 l -21.49378,-12.40958 v -13.33356 l 41.89357,-24.18767 z m 41.90391,24.193351 v 144.47387 l 41.90803,-24.19542 v -96.08302 z"/>
        <path d="m 156.40596,53.406042 v 48.379478 l 41.8977,-24.18974 z"/>
      </g>
    </g>
    <!-- QORION text, baseline aligned with logo center -->
    <text class="company-name" x="5" y="19" text-anchor="start">QORION</text>
  </g>

  <!-- Description centered below -->
  <text class="company-desc" x="210" y="50" text-anchor="middle">Enterprise SaaS · Management Platforms · Game Development</text>
</svg>