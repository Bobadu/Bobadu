<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220" viewBox="0 0 480 220">
  <defs>
    <style>
      .card { fill: #161b22; stroke: #21262d; stroke-width: 1; rx: 8; }
      .big-num { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 900; }
      .ceo-text { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 1px; }
      .label { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>

  <!-- 8+ Years -->
  <rect class="card" x="0" y="0" width="230" height="100" rx="8"/>
  <text class="big-num" x="115" y="52" text-anchor="middle">8+</text>
  <text class="label" x="115" y="74" text-anchor="middle">Years of Experience</text>

  <!-- CEO @ Qorion -->
  <rect class="card" x="250" y="0" width="230" height="100" rx="8"/>
  <text class="ceo-text" x="365" y="52" text-anchor="middle">CEO</text>
  <text class="label" x="365" y="74" text-anchor="middle">@ Qorion</text>

  <!-- React.js Contributor -->
  <rect class="card" x="0" y="120" width="230" height="100" rx="8"/>
  <!-- React atom icon -->
  <g transform="translate(115, 148)">
    <circle cx="0" cy="0" r="3" fill="#61DAFB"/>
    <ellipse cx="0" cy="0" rx="14" ry="5.5" stroke="#61DAFB" stroke-width="1" fill="none"/>
    <ellipse cx="0" cy="0" rx="14" ry="5.5" stroke="#61DAFB" stroke-width="1" fill="none" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="14" ry="5.5" stroke="#61DAFB" stroke-width="1" fill="none" transform="rotate(120)"/>
  </g>
  <text class="label" x="115" y="180" text-anchor="middle">React.js Contributor</text>

  <!-- System Designer -->
  <rect class="card" x="250" y="120" width="230" height="100" rx="8"/>
  <!-- Grid/architecture icon -->
  <g transform="translate(350, 135)" fill="none" stroke="#e6edf3" stroke-width="1.5">
    <rect x="0" y="0" width="10" height="10" rx="1.5"/>
    <rect x="16" y="0" width="10" height="10" rx="1.5"/>
    <rect x="0" y="16" width="10" height="10" rx="1.5"/>
    <rect x="16" y="16" width="10" height="10" rx="1.5"/>
    <line x1="10" y1="5" x2="16" y2="5" stroke-dasharray="2 1"/>
    <line x1="5" y1="10" x2="5" y2="16" stroke-dasharray="2 1"/>
    <line x1="21" y1="10" x2="21" y2="16" stroke-dasharray="2 1"/>
    <line x1="10" y1="21" x2="16" y2="21" stroke-dasharray="2 1"/>
  </g>
  <text class="label" x="365" y="180" text-anchor="middle">System Designer</text>
</svg>